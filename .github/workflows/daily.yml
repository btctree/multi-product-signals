name: Signals + dashboard (hourly)

on:
  schedule:
    - cron: "5 * * * *"       # hourly at :05 (GitHub skips :00 crons under load;
                              # sub-hourly is unreliable per our own BTC findings)
  workflow_dispatch: {}        # manual run from the Actions tab
  push:
    branches: [main]           # rebuild + deploy on every push

permissions:
  contents: write              # midnight commit of universe/name-cache only
  pages: write
  id-token: write

concurrency:
  group: signals
  cancel-in-progress: true     # a fresh run supersedes a stuck one

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh universe (midnight UTC runs only - heavy market-cap re-rank)
        working-directory: engine
        run: |
          if [ "$(date -u +%H)" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -c "from universe import update_universe; from report import load_positions; update_universe(set(load_positions().keys()))" \
              || python -c "from universe import load_universe; load_universe()"
          else
            python -c "from universe import load_universe; load_universe()"
          fi

      - name: Download prices (10y daily, ~194 products)
        working-directory: engine
        run: python data_fetch.py

      - name: Build dashboard
        working-directory: engine
        run: python build_dashboard.py --names

      - name: Persist universe + name cache (midnight only - keeps repo lean)
        run: |
          if [ "$(date -u +%H)" = "00" ]; then
            git config user.name  "signals-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/universe.json data/company_names.json || true
            git commit -m "daily: universe + name cache [skip ci]" || echo "no changes"
            git push || echo "nothing to push"
          fi

      # dashboard is served from the freshly-built artifact - docs/ data is never
      # committed hourly, so the repo does not grow with price churn
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
