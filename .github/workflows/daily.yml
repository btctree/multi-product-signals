name: Signals + dashboard (hourly)

on:
  schedule:
    - cron: "5 * * * *"        # hourly build (GitHub skips :00 crons under load;
                               # sub-hourly is unreliable per our own BTC findings)
    - cron: "20 0 * * *"       # DAILY universe refresh — identified by
                               # github.event.schedule, so it works even when
                               # GitHub fires the cron 30-50 min late
  workflow_dispatch: {}        # manual run = full run incl. universe refresh
  push:
    branches: [main]           # rebuild + deploy on every push

permissions:
  contents: write              # midnight commit of universe/name-cache only
  pages: write
  id-token: write

concurrency:
  group: signals
  cancel-in-progress: true     # a fresh run supersedes a stuck one

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Download prices (10y daily, full universe)
        working-directory: engine
        run: python data_fetch.py

      - name: Refresh universe (daily cron or manual run - analyst policy)
        working-directory: engine
        env:
          IS_DAILY: ${{ github.event.schedule == '20 0 * * *' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_DAILY" = "true" ]; then
            echo "=== DAILY monitoring-list refresh (grow-only cap + analyst adds; illiquidity-only removal) ==="
            python -c "from universe import update_universe; from report import load_positions; update_universe(set(load_positions().keys()))" \
              || { echo "::warning::universe refresh FAILED - keeping previous list"; python -c "from universe import load_universe; load_universe()"; }
            python data_fetch.py   # pick up history for any newly added products
            echo "=== export backtest trade history for dashboard ==="
            python export_backtest_trades.py || echo "::warning::backtest export failed"
          else
            python -c "from universe import load_universe; u=load_universe(); print(f'hourly build: universe unchanged ({len(u[\"tickers\"])} tickers, last updated {u[\"updated\"]})')"
          fi

      - name: Build dashboard
        working-directory: engine
        run: python build_dashboard.py --names

      - name: Telegram alert (daily runs; no-op unless secrets configured)
        env:
          IS_DAILY: ${{ github.event.schedule == '20 0 * * *' || github.event_name == 'workflow_dispatch' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: engine
        run: |
          if [ "$IS_DAILY" = "true" ]; then python notify_telegram.py || echo "::warning::telegram failed"; fi

      - name: Persist universe + name cache (daily runs only - keeps repo lean)
        env:
          IS_DAILY: ${{ github.event.schedule == '20 0 * * *' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_DAILY" = "true" ]; then
            git config user.name  "signals-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/universe.json data/company_names.json data/backtest_trades.json || true
            git commit -m "daily: universe + name cache [skip ci]" || echo "no changes"
            git pull --rebase origin main || true
            git push || echo "nothing to push"
          fi

      # dashboard is served from the freshly-built artifact - docs/ data is never
      # committed hourly, so the repo does not grow with price churn
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
