<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Signals">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Multi-Product Signals</title>
<style>
  :root{
    --bg:#0b1220; --card:#151f31; --card2:#1c2942; --line:#243352;
    --txt:#e8eef7; --dim:#93a4c0; --green:#37d67a; --red:#ff6b6b;
    --amber:#ffc14d; --blue:#4d9bff; --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    font-size:15px;line-height:1.45}
  a{color:var(--blue)}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#0e1830,#0b1220);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--dim);font-size:12px;margin-top:2px}
  .stats{display:flex;gap:8px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stat{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:6px 11px;font-size:12px}
  .stat b{display:block;font-size:15px;color:var(--green)}
  main{padding:14px 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px)}
  .view{display:none}
  /* every tab fills at least the full screen so switching tabs never jumps */
  .view.active{display:block;min-height:calc(100dvh - 230px)}
  .btn-rec{display:block;width:100%;margin-top:10px;padding:11px;font-size:14px;
    font-weight:700;color:var(--green);background:rgba(55,214,122,.10);
    border:1px solid rgba(55,214,122,.45);border-radius:12px;cursor:pointer}
  .btn-row{display:flex;gap:8px;margin-top:10px}
  .btn-sm{flex:1;padding:9px;font-size:13px;font-weight:600;border-radius:10px;
    cursor:pointer;background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  .btn-sell{color:var(--red);border-color:rgba(255,107,107,.4)}
  .list-row{display:flex;justify-content:space-between;align-items:center;
    padding:11px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .list-row:active{background:var(--card2)}
  .list-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;margin-top:12px}
  .chips{display:flex;gap:6px;margin-top:10px;overflow-x:auto;
    -webkit-overflow-scrolling:touch;padding-bottom:2px}
  .chip{flex:0 0 auto;font-size:12px;font-weight:600;padding:7px 12px;
    border-radius:18px;border:1px solid var(--line);background:var(--card);
    color:var(--dim);cursor:pointer;white-space:nowrap}
  .chip.on{background:rgba(77,155,255,.15);border-color:var(--blue);color:var(--blue)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:14px;margin-bottom:12px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .sym{font-weight:700;font-size:16px} .nm{color:var(--dim);font-size:12px}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .b-BUY,.b-BUYHOLD{background:rgba(55,214,122,.15);color:var(--green);border:1px solid rgba(55,214,122,.4)}
  .b-WATCH{background:rgba(255,193,77,.13);color:var(--amber);border:1px solid rgba(255,193,77,.4)}
  .b-HOLD{background:rgba(77,155,255,.13);color:var(--blue);border:1px solid rgba(77,155,255,.4)}
  .b-AVOID{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.35)}
  .levels{display:flex;gap:8px;margin:10px 0 6px;flex-wrap:wrap}
  .lv{flex:1 1 30%;background:var(--card2);border-radius:10px;padding:7px 9px;min-width:84px}
  .lv span{display:block;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .lv b{font-size:15px} .lv.t b{color:var(--green)} .lv.s b{color:var(--red)}
  .exp{color:var(--txt);font-size:13px;margin:6px 0}
  ul.rz{margin:6px 0 0;padding-left:18px} ul.rz li{margin:3px 0;color:var(--dim);font-size:13px}
  .conf{font-size:11px;color:var(--dim)} .conf b{color:var(--txt)}
  .muted{color:var(--dim);font-size:13px;text-align:center;padding:24px}
  .search-box{position:relative}
  #q{width:100%;padding:13px 14px;font-size:16px;background:var(--card);color:var(--txt);
    border:1px solid var(--line);border-radius:14px;outline:none}
  #q:focus{border-color:var(--blue)}
  #hits{position:absolute;left:0;right:0;top:52px;z-index:8;background:var(--card2);
    border:1px solid var(--line);border-radius:12px;max-height:46vh;overflow:auto;display:none}
  #hits div{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  #hits div:hover{background:var(--card)}
  #hits .h-sym{font-weight:700} #hits .h-nm{color:var(--dim);font-size:12px}
  .chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:10px;margin:12px 0}
  canvas{width:100%!important;height:220px!important}
  nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);background:rgba(13,20,36,.92);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:9px;cursor:pointer}
  nav button.on{color:var(--blue)} nav svg{width:22px;height:22px;fill:currentColor}
  .sec-h{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:4px 2px 10px}
  .pnl-pos{color:var(--green)} .pnl-neg{color:var(--red)}
  .pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;
    background:var(--card2);color:var(--dim);margin-left:6px}
</style>
</head>
<body>
<header>
  <h1>Multi-Product Signals</h1>
  <div class="sub" id="prod">Loading…</div>
  <div class="stats" id="stats"></div>
</header>

<main>
  <section id="v-actions" class="view active"></section>
  <section id="v-positions" class="view"></section>
  <section id="v-history" class="view"></section>
  <section id="v-search" class="view">
    <div class="search-box">
      <input id="q" placeholder="Search name, symbol or code…" autocomplete="off" autocapitalize="off" style="padding-right:52px">
      <button id="qclear" onclick="clearSearch()" title="Clear"
        style="position:absolute;right:8px;top:8px;bottom:8px;width:36px;border-radius:10px;
        border:1px solid var(--line);background:var(--card2);color:var(--dim);
        font-size:16px;cursor:pointer">✕</button>
      <div id="hits"></div>
    </div>
    <div id="chips-m" class="chips"></div>
    <div id="chips-a" class="chips"></div>
    <div id="detail"></div>
  </section>
</main>

<nav>
  <button data-v="actions" class="on" onclick="tab('actions',this)">
    <svg viewBox="0 0 24 24"><path d="M3 13h2l3 6 4-14 3 8h6" fill="none" stroke="currentColor" stroke-width="2"/></svg>Actions</button>
  <button data-v="positions" onclick="tab('positions',this)">
    <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z M4 10h16" fill="none" stroke="currentColor" stroke-width="2"/></svg>Positions</button>
  <button data-v="history" onclick="tab('history',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2"/></svg>History</button>
  <button data-v="search" onclick="tab('search',this)">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 20l-4-4" stroke="currentColor" stroke-width="2"/></svg>Search</button>
</nav>

<script>
const $=s=>document.querySelector(s);
const safe=s=>s.replaceAll('^','_IDX_').replaceAll('=','_EQ_').replaceAll('.','_');
let DATA=null, IDX=[], chart=null;

function badge(a){const k=a.replace(/[^A-Z]/g,'');return `<span class="badge b-${k}">${a}</span>`}
function money(x){return x==null?'—':(''+x)}

function cardHTML(c, big){
  const lv = (c.entry||c.target||c.stop) ? `<div class="levels">
      ${c.entry!=null?`<div class="lv"><span>Entry</span><b>${c.entry}</b></div>`:''}
      ${c.target!=null?`<div class="lv t"><span>Target</span><b>${c.target}</b></div>`:''}
      ${c.stop!=null?`<div class="lv s"><span>Cut-loss</span><b>${c.stop}</b></div>`:''}
    </div>`:'';
  return `<div class="card">
    <div class="row"><div><div class="sym">${c.symbol||c.sym} <span class="pill">${c.market}</span></div>
      <div class="nm">${c.name}</div></div>${badge(c.action)}</div>
    <div class="conf">Regime: <b>${c.regime}</b> · Price <b>${c.price}</b> · Confidence <b>${c.confidence||'—'}</b></div>
    ${lv}
    <div class="exp">${c.expectation||''}</div>
    ${c.reasons&&c.reasons.length?`<ul class="rz">${c.reasons.map(r=>`<li>${r}</li>`).join('')}</ul>`:''}
    ${(c.action==='BUY'||c.action==='BUY/HOLD')?`<button class="btn-rec" data-sym="${c.symbol||c.sym}" onclick="recordBuy(this.dataset.sym)">✓ I bought this — track it in Positions</button>`:''}
  </div>`;
}

// ---- on-phone position tracking (stored in this device's browser) ----
const lsGet=k=>{try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return[]}};
const lsSet=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function findCard(sym){return (DATA.actions||[]).find(c=>(c.symbol||c.sym)===sym)
  || (IDX.find(o=>o.sym===sym)?{symbol:sym,price:IDX.find(o=>o.sym===sym).price}:null);}
function recordBuy(sym){
  const c=findCard(sym); if(!c)return;
  const px=parseFloat(prompt(`Your fill price for ${sym}:`, c.price)); if(!px)return;
  const qty=parseFloat(prompt(`Quantity (shares/units) for ${sym}:`, '1'))||1;
  const pos=lsGet('mps_positions');
  const ex=pos.find(p=>p.sym===sym);
  if(ex){ // add to an existing position: blend average entry
    const tot=ex.qty+qty;
    ex.entry=Math.round((ex.entry*ex.qty+px*qty)/tot*10000)/10000; ex.qty=tot;
  }else{
    pos.push({sym, name:c.name||sym, entry:px, qty,
              entry_date:new Date().toISOString().slice(0,10),
              target:c.target||null, stop:c.stop||null,
              sleeve:(c.market==='CRYPTO'?'CRY':'DIP')});
  }
  lsSet('mps_positions',pos); renderPositions();
  alert(`Tracked: ${qty} x ${sym} @ ${px}\n\nNow place the resting orders with your broker:\n`+
        (c.target?`• SELL LIMIT at ${c.target}\n`:'')+(c.stop?`• SELL STOP at ${c.stop}`:''));
}
function recordSell(sym){
  const pos=lsGet('mps_positions'); const p=pos.find(x=>x.sym===sym); if(!p)return;
  const live=IDX.find(o=>o.sym===sym);
  const px=parseFloat(prompt(`Your exit price for ${sym}:`, live?live.price:p.entry)); if(!px)return;
  let q=parseFloat(prompt(`Quantity to sell (you hold ${p.qty||1}) — enter less for a PARTIAL sell:`, p.qty||1));
  if(!q||q<=0)return; q=Math.min(q,p.qty||1);
  const pnl=Math.round((px/p.entry-1)*1000)/10;
  const h=lsGet('mps_history');
  h.push({id:Date.now(), date:new Date().toISOString().slice(0,10), action:(q<(p.qty||1)?'PARTIAL SELL':'SELL'),
          sym, name:p.name, qty:q, price:px, entry:p.entry, pnl_pct:pnl,
          pnl_amt:Math.round((px-p.entry)*q*100)/100});
  if(q<(p.qty||1)){ p.qty=Math.round((p.qty-q)*10000)/10000; lsSet('mps_positions',pos); }
  else{ lsSet('mps_positions',pos.filter(x=>x.sym!==sym)); }
  lsSet('mps_history',h);
  renderPositions(); renderHistory();
}
function delPos(sym){
  if(!confirm('Remove '+sym+' without logging a trade?'))return;
  lsSet('mps_positions',lsGet('mps_positions').filter(x=>x.sym!==sym)); renderPositions();
}
function delHist(id){
  if(!confirm('Delete this trade record?'))return;
  lsSet('mps_history',lsGet('mps_history').filter(x=>String(x.id)!==String(id)));
  renderHistory();
}

function renderActions(){
  const el=$('#v-actions');
  const a=DATA.actions||[];
  const ch=DATA.universe_changes||[];
  const chHtml = `<div class="card" style="padding:10px 14px">
     <div class="conf">Monitoring list: <b>${DATA.universe_count} products</b> ·
     re-ranked daily by market cap · last refresh <b>${DATA.universe_updated||DATA.generated}</b></div>
     ${ch.length? ch.map(c=>`<div class="nm" style="margin-top:4px">${c.date} — ${c.verb}: ${c.tickers.join(', ')}</div>`).join('')
       : '<div class="nm" style="margin-top:4px">No additions/removals in the latest refreshes.</div>'}
   </div>`;
  el.innerHTML = `<div class="sec-h">Today's best actions — ${DATA.generated}</div>` +
    (a.length? a.map(c=>cardHTML(c)).join('') :
     `<div class="muted">No new buy signals today. Standing aside is a position — the engine only acts when it has a measured edge.</div>`) +
    `<div class="sec-h" style="margin-top:16px">Monitoring list updates</div>` + chHtml;
}
function renderPositions(){
  const el=$('#v-positions');
  const local=lsGet('mps_positions');
  const server=DATA.positions||[];
  const rows=[...local.map(x=>({...x,src:'local'})),...server.map(x=>({...x,src:'server'}))];
  el.innerHTML=`<div class="sec-h">Current positions</div>`+
    (rows.length? rows.map(x=>{
      const live=IDX.find(o=>o.sym===x.sym);
      const last=x.last!=null?x.last:(live?live.price:null);
      const pnl=x.pnl_pct!=null?x.pnl_pct:(last&&x.entry?Math.round((last/x.entry-1)*1000)/10:null);
      const amt=(last&&x.entry&&x.qty)?Math.round((last-x.entry)*x.qty*100)/100:null;
      const cls=(pnl||0)>=0?'pnl-pos':'pnl-neg';
      return `<div class="card"><div class="row"><div><div class="sym">${x.sym} <span class="pill">${x.sleeve||''}</span>${x.qty?` <span class="pill">qty ${x.qty}</span>`:''}</div>
        <div class="nm">${x.name||''}</div></div><div style="text-align:right"><div class="${cls}" style="font-weight:700">${pnl==null?'':(pnl>0?'+':'')+pnl+'%'}</div>${amt!=null?`<div class="nm ${cls}">${amt>0?'+':''}${amt}</div>`:''}</div></div>
        <div class="levels"><div class="lv"><span>Entry ${x.entry_date||''}</span><b>${money(x.entry)}</b></div>
        <div class="lv"><span>Last</span><b>${money(last)}</b></div>
        <div class="lv t"><span>Target</span><b>${money(x.target)}</b></div>
        <div class="lv s"><span>Cut-loss</span><b>${money(x.stop)}</b></div></div>
        ${x.src==='local'?`<div class="btn-row">
          <button class="btn-sm btn-sell" data-sym="${x.sym}" onclick="recordSell(this.dataset.sym)">Record sell</button>
          <button class="btn-sm" data-sym="${x.sym}" onclick="delPos(this.dataset.sym)">✕ Remove</button>
        </div>`:''}</div>`;
    }).join('') : `<div class="muted">No open positions yet.<br><br>When a signal on the Actions tab shows
      "<b>✓ I bought this</b>", tap it after you buy — the position appears here with live P&L,
      and its target/cut-loss are tracked for you. (Stored on this device.)</div>`);
}
function renderHistory(){
  const el=$('#v-history');
  const mine=lsGet('mps_history').slice().reverse();
  const bt=DATA.backtest_trades||[];
  const wins=mine.filter(x=>(x.pnl_pct||0)>0).length;
  const totAmt=Math.round(mine.reduce((s,x)=>s+(x.pnl_amt||0),0)*100)/100;
  const summary = mine.length? `<div class="card" style="padding:10px 14px"><div class="conf">
      My performance: <b>${mine.length}</b> closed trades · <b>${Math.round(wins/mine.length*100)}%</b> winners ·
      total P&L <b class="${totAmt>=0?'pnl-pos':'pnl-neg'}">${totAmt>0?'+':''}${totAmt}</b></div></div>` : '';
  const mineHtml = mine.length? summary+mine.map(x=>{
      const cls=(x.pnl_pct||0)>=0?'pnl-pos':'pnl-neg';
      return `<div class="card"><div class="row"><div class="sym">${x.action||''} ${x.sym}${x.qty?` <span class="pill">qty ${x.qty}</span>`:''}</div>
        <div style="display:flex;align-items:center;gap:10px"><div style="text-align:right">
          <div class="${cls}" style="font-weight:700">${x.pnl_pct!=null?(x.pnl_pct>0?'+':'')+x.pnl_pct+'%':''}</div>
          ${x.pnl_amt!=null?`<div class="nm ${cls}">${x.pnl_amt>0?'+':''}${x.pnl_amt}</div>`:''}</div>
        <button class="btn-sm" style="flex:none;padding:6px 10px" data-id="${x.id||''}" onclick="delHist(this.dataset.id)">✕</button></div></div>
        <div class="nm">${x.date||''} · ${x.name||''} · in @ ${money(x.entry)} → out @ ${money(x.price)}</div></div>`;
    }).join('') : `<div class="muted" style="padding:12px">No trades recorded on this device yet —
      use "✓ I bought this" on a signal, then "Record sell" in Positions.</div>`;
  const btHtml = bt.length? `<div class="list-wrap">`+bt.slice(0,80).map(x=>{
      const cls=x.ret_pct>=0?'pnl-pos':'pnl-neg';
      return `<div class="list-row" data-sym="${x.sym}" onclick="goDetail(this.dataset.sym)">
        <div><b>${x.sym}</b> <span class="pill">${x.sleeve}</span>
        <div class="nm">${x.entry_date} → ${x.exit_date} · ${x.hold_days}d · ${x.reason}</div></div>
        <div class="${cls}" style="font-weight:700">${x.ret_pct>0?'+':''}${x.ret_pct}%</div></div>`;
    }).join('')+`</div>` : `<div class="muted">Backtest history appears after the next daily update.</div>`;
  el.innerHTML=`<div class="sec-h">My recorded trades (this device)</div>`+mineHtml+
    `<div class="sec-h" style="margin-top:18px">Backtest trade history — validation, not live fills</div>
     <div class="nm" style="margin:0 2px 10px">The most recent trades the P1+SMA200 engine took in the
     11-year backtest (net of costs). This is what the strategy's behaviour looks like.</div>`+btHtml;
}
function goDetail(sym){ tab('search',document.querySelector('nav button[data-v=search]')); pick(sym); }

// ---- search / autocomplete + filterable full-universe status list ----
let fM='All', fA='All';
const CAP=400; // rows rendered at once (keeps Safari smooth on ~1,000 products)
function renderChips(){
  const ms=['All',...Array.from(new Set(IDX.map(o=>o.market))).sort()];
  const as=['All','BUY','WATCH','HOLD','AVOID'];
  const cnt=(k,v)=>k==='All'?IDX.length:IDX.filter(o=>(v==='m'?o.market===k:(o.action||'').startsWith(k))).length;
  $('#chips-m').innerHTML=ms.map(m=>`<div class="chip ${fM===m?'on':''}" data-v="${m}"
      onclick="setChip('m',this.dataset.v)">${m} ${m==='All'?'':cnt(m,'m')}</div>`).join('');
  $('#chips-a').innerHTML=as.map(a=>`<div class="chip ${fA===a?'on':''}" data-v="${a}"
      onclick="setChip('a',this.dataset.v)">${a} ${a==='All'?'':cnt(a,'a')}</div>`).join('');
}
function setChip(kind,v){ if(kind==='m')fM=v; else fA=v; renderChips(); renderAllProducts(); }
function requestAddHTML(q){
  const sym=q.toUpperCase();
  const url='https://github.com/btctree/multi-product-signals/issues/new'
    +'?title='+encodeURIComponent('ADD: '+sym)
    +'&body='+encodeURIComponent('Please add '+sym+' to the monitoring pool. (One-tap request from the dashboard.)');
  return `<div class="card" style="text-align:center">
    <div class="nm" style="margin-bottom:8px">"${sym}" is not in the monitoring pool yet.</div>
    <a class="btn-rec" style="text-decoration:none" href="${url}" target="_blank">＋ Request to add ${sym} — auto-analyzed in ~5 min</a>
    <div class="nm" style="margin-top:8px">Opens a pre-filled GitHub request; the system validates the symbol, adds it, and rebuilds automatically.</div></div>`;
}
function renderAllProducts(){
  renderChips();
  let rows=IDX;
  if(fM!=='All')rows=rows.filter(o=>o.market===fM);
  if(fA!=='All')rows=rows.filter(o=>(o.action||'').startsWith(fA));
  const groups={};
  rows.forEach(o=>{(groups[o.market]=groups[o.market]||[]).push(o)});
  let shown=0;
  $('#detail').innerHTML =
    `<div class="sec-h" style="margin-top:14px">${rows.length} of ${IDX.length} monitored products — tap for full analysis</div>`+
    Object.keys(groups).sort().map(m=>{
      const g=groups[m].slice(0,Math.max(0,CAP-shown)); shown+=g.length;
      if(!g.length)return '';
      return `<div class="sec-h" style="margin-top:12px">${m} (${groups[m].length})</div>
      <div class="list-wrap">`+g.map(o=>`
        <div class="list-row" data-sym="${o.sym}" onclick="pick(this.dataset.sym)">
          <div><b>${o.sym}</b><div class="nm">${o.name}</div></div>
          <div style="text-align:right">${badge(o.action)}<div class="nm">${o.price}</div></div>
        </div>`).join('')+`</div>`;}).join('')+
    (shown<rows.length?`<div class="muted">Showing ${shown} of ${rows.length} — use the filters or search to narrow.</div>`:'');
}
function clearSearch(){
  $('#q').value=''; $('#hits').style.display='none'; renderAllProducts();
}
function runSearch(){
  const q=$('#q').value.trim().toLowerCase();
  const hits=$('#hits');
  if(!q){hits.style.display='none';renderAllProducts();return;}
  const m=IDX.filter(o=>o.sym.toLowerCase().includes(q)||o.name.toLowerCase().includes(q)).slice(0,30);
  hits.innerHTML=m.map(o=>`<div data-sym="${o.sym}" onclick="pick(this.dataset.sym)">
     <span class="h-sym">${o.sym}</span> <span class="pill">${o.market}</span><div class="h-nm">${o.name}</div></div>`).join('');
  hits.style.display=m.length?'block':'none';
  if(!m.length && q.length>=2){ $('#detail').innerHTML=requestAddHTML($('#q').value.trim()); }
}
function loadChartLib(){
  return new Promise(res=>{
    if(typeof Chart!=='undefined')return res(true);
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    s.onload=()=>res(true); s.onerror=()=>res(false);
    setTimeout(()=>res(typeof Chart!=='undefined'),4000);
    document.head.appendChild(s);
  });
}
async function pick(sym){
  $('#hits').style.display='none'; $('#q').value=sym;
  const d=$('#detail'); d.innerHTML='<div class="muted">Loading…</div>';
  try{
    const r=await fetch('products/'+safe(sym)+'.json'); const p=await r.json();
    d.innerHTML=`<div class="chart-wrap"><canvas id="cv"></canvas></div>`+cardHTML(p.card,true);
    await loadChartLib();
    drawChart(p);
  }catch(e){ d.innerHTML='<div class="muted">No data for this product.</div>'; }
}
function drawChart(p){
  const ctx=$('#cv');
  if(typeof Chart==='undefined'){ ctx.parentElement.innerHTML=
    '<div class="muted">Price chart needs an internet connection (Chart.js). Analysis below works offline.</div>'; return; }
  if(chart)chart.destroy();
  const labels=p.prices.map(x=>x[0]);
  const price=p.prices.map(x=>x[1]);
  const smap=new Map(p.sma200.map(x=>[x[0],x[1]]));
  const sma=labels.map(l=>smap.has(l)?smap.get(l):null);
  chart=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:p.sym,data:price,borderColor:'#4d9bff',borderWidth:2,pointRadius:0,tension:.15},
    {label:'200-day avg',data:sma,borderColor:'#ffc14d',borderWidth:1.2,borderDash:[5,4],pointRadius:0}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{labels:{color:'#93a4c0',boxWidth:12,font:{size:11}}}},
    scales:{x:{ticks:{color:'#5f6f8c',maxTicksLimit:5,font:{size:10}},grid:{display:false}},
      y:{ticks:{color:'#5f6f8c',font:{size:10}},grid:{color:'#1c2942'}}}}});
}

function tab(v,btn){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  $('#v-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function boot(){
  try{
    const r=await fetch('data.json?t='+Date.now()); DATA=await r.json();
    IDX=DATA.index||[];
    $('#prod').textContent=DATA.product+' · '+DATA.generated;
    const h=DATA.headline||{};
    $('#stats').innerHTML=[
      ['Win rate',h.win],['CAGR',h.cagr],['Max DD',h.maxdd],['Universe',DATA.universe_count+' products']
    ].map(([k,v])=>`<div class="stat">${k}<b>${v}</b></div>`).join('');
    renderActions();renderPositions();renderHistory();renderAllProducts();
  }catch(e){ $('#prod').textContent='Could not load data.json'; }
  $('#q').addEventListener('input',runSearch);
}
boot();
</script>
</body>
</html>
